name: Process schedule inbox

# Triggers when new files land in content/schedule-inbox/ (excluding the
# processed/ + failed/ subdirs and the README). Sends each to Claude Haiku
# for extraction, merges into content/schedule.json, moves the source file
# into processed/ or failed/.

on:
  push:
    paths:
      - 'content/schedule-inbox/**'
      - '!content/schedule-inbox/processed/**'
      - '!content/schedule-inbox/failed/**'
      - '!content/schedule-inbox/README.md'
      - '!content/schedule-inbox/.gitkeep'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify API key is set
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set."
            echo "::error::Set it from your terminal: gh secret set ANTHROPIC_API_KEY"
            exit 1
          fi

      - name: Process inbox
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/process-inbox.mjs

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "inbox: process schedule files $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Schedule inbox processing failed`,
              body: `The \`process-inbox\` workflow failed.\n\n- Run: ${runUrl}\n\nCheck whether \`ANTHROPIC_API_KEY\` is set, and whether the dropped files are PDF/PNG/JPG.`
            });
