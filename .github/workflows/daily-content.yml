name: Daily content

# 04:00 UTC = 06:00 in Lenzerheide during CEST (summer) / 05:00 CET (winter).
# Early enough that the kids see fresh content at breakfast.
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

# Opt in early to the Node 24 runtime that GitHub Actions makes default on
# 2026-06-02; silences the deprecation warning on actions/checkout@v4 and
# actions/setup-node@v4.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update-today:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate today.json
        run: node scripts/generate-today.mjs

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add content/today.json
          if git diff --staged --quiet; then
            echo "No changes — content/today.json already up to date."
          else
            git commit -m "chore: daily content $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily content workflow failed: ${date}`,
              body: `The \`daily-content\` workflow failed.\n\n- Run: ${runUrl}\n- Date: ${date}\n\nThe site continues to serve the previous \`content/today.json\` until this is fixed.`
            });
