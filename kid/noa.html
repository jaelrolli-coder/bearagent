<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FAF6F0">
  <title>Bearagent — Noa</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <main class="kid-page" data-profile="noa">
    <header class="kid-header">
      <h1 class="kid-greeting">
        <span class="i18n" data-de="Hallo Noa! 👋" data-en="Hi Noa! 👋">Hallo Noa! 👋</span>
      </h1>
      <div class="lang-toggle" role="group" aria-label="Language">
        <button type="button" data-lang="de" class="active">DE</button>
        <button type="button" data-lang="en">EN</button>
      </div>
    </header>

    <section class="tiles">
      <button class="tile tile--big tile--coming" data-feature="videos">
        <div>
          <div class="tile-icon">🎬</div>
          <h2 class="tile-title i18n" data-de="Videos" data-en="Videos">Videos</h2>
          <p class="tile-sub i18n" data-de="Deine Auswahl heute" data-en="Your picks today">Deine Auswahl heute</p>
        </div>
        <span class="tile-cta i18n" data-de="Bald verfügbar" data-en="Coming soon">Bald verfügbar</span>
      </button>

      <button class="tile tile--coming" data-feature="sudoku">
        <div>
          <div class="tile-icon">🔢</div>
          <h2 class="tile-title">Sudoku</h2>
          <p class="tile-sub i18n" data-de="Rätsel des Tages" data-en="Puzzle of the day">Rätsel des Tages</p>
        </div>
        <span class="tile-cta i18n" data-de="Bald verfügbar" data-en="Coming soon">Bald verfügbar</span>
      </button>

      <button class="tile tile--coming" data-feature="word">
        <div>
          <div class="tile-icon">📚</div>
          <h2 class="tile-title i18n" data-de="Wort des Tages" data-en="Word of the day">Wort des Tages</h2>
          <p class="tile-sub i18n" data-de="DE + EN" data-en="DE + EN">DE + EN</p>
        </div>
        <span class="tile-cta i18n" data-de="Bald verfügbar" data-en="Coming soon">Bald verfügbar</span>
      </button>

      <button class="tile tile--coming" data-feature="fact">
        <div>
          <div class="tile-icon">💡</div>
          <h2 class="tile-title i18n" data-de="Fun Fact" data-en="Fun fact">Fun Fact</h2>
          <p class="tile-sub i18n" data-de="Wusstest du..." data-en="Did you know...">Wusstest du...</p>
        </div>
        <span class="tile-cta i18n" data-de="Bald verfügbar" data-en="Coming soon">Bald verfügbar</span>
      </button>

      <button class="tile tile--coming" data-feature="schedule">
        <div>
          <div class="tile-icon">📅</div>
          <h2 class="tile-title i18n" data-de="Mein Tag" data-en="My day">Mein Tag</h2>
          <p class="tile-sub i18n" data-de="Was heute passiert" data-en="What's happening today">Was heute passiert</p>
        </div>
        <span class="tile-cta i18n" data-de="Bald verfügbar" data-en="Coming soon">Bald verfügbar</span>
      </button>

      <button class="tile tile--coming" data-feature="news">
        <div>
          <div class="tile-icon">📰</div>
          <h2 class="tile-title i18n" data-de="Kindernachrichten" data-en="Kids' news">Kindernachrichten</h2>
          <p class="tile-sub i18n" data-de="logo! + Newsround" data-en="logo! + Newsround">logo! + Newsround</p>
        </div>
        <span class="tile-cta i18n" data-de="Bald verfügbar" data-en="Coming soon">Bald verfügbar</span>
      </button>

      <button class="tile tile--coming" data-feature="emergency">
        <div>
          <div class="tile-icon">🆘</div>
          <h2 class="tile-title i18n" data-de="Notfall" data-en="Emergency">Notfall</h2>
          <p class="tile-sub i18n" data-de="Wichtige Infos" data-en="Important info">Wichtige Infos</p>
        </div>
        <span class="tile-cta i18n" data-de="Bald verfügbar" data-en="Coming soon">Bald verfügbar</span>
      </button>
    </section>

    <a href="../index.html" class="back-link">
      <span class="i18n" data-de="← Zurück zur Auswahl" data-en="← Back to picker">← Zurück zur Auswahl</span>
    </a>
  </main>
  <script src="../js/i18n.js"></script>
  <script src="../js/tiles.js"></script>
  <script src="../js/register-sw.js"></script>
</body>
</html>
