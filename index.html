<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FAF6F0">
  <title>Bearagent</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="assets/img/icon.svg">
  <link rel="apple-touch-icon" href="assets/img/icon-192.png">
</head>
<body class="picker-page">
  <main class="picker">
    <h1 class="logo">🐻 Bearagent</h1>
    <p class="prompt">
      <span class="prompt-de">Wer benutzt Bearagent?</span>
      <span class="prompt-en">Who's using Bearagent?</span>
    </p>
    <div class="profiles">
      <a class="profile" href="kid/noa.html" data-profile="noa">
        <div class="profile-avatar profile-avatar--noa">N</div>
        <span class="profile-name">Noa</span>
      </a>
      <a class="profile" href="kid/nina.html" data-profile="nina">
        <div class="profile-avatar profile-avatar--nina">N</div>
        <span class="profile-name">Nina</span>
      </a>
    </div>
    <button class="parent-corner" aria-label="Parent override" title="Eltern-Menü: lang drücken oder dreifach klicken">🐾</button>
  </main>
  <script src="js/picker.js"></script>
  <script src="js/parent.js"></script>
  <script src="js/register-sw.js"></script>
</body>
</html>
